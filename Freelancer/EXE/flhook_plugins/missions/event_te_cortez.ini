;; ###############################
;; ------MISSION DESCRIPTION------
;; ###############################

; 	Event Script for a Team Elimination Gameplay in the Cortez System with up to 4 Teams

;	Team Red Start:
;	Team Blue Start:
; 	Team Green Start:
;	Team Gold Start:

;; ###############################
;; ------------LABELS-------------
;; ###############################

;	players					-	Players inside the Building Area (Standard)
;	TeamRed					-	Players who are playing for Team Red
;	TeamBlue				-	Players who are playing for Team Blue
;	TeamGreen				-	Players who are playing for Team Green
;	TeamGold				-	Players who are playing for Team Gold
;	Red_Fighter				- 	Players who are playing as fighters assigned to the Red Team
;	Red_Flagship			- 	Players who are playing as the Flagship assigned to the Red Team
;	Blue_Fighter			- 	Players who are playing as fighters assigned to the Blue Team
;	Blue_Flagship			- 	Players who are playing as the Flagship assigned to the Blue Team
;	Green_Fighter			- 	Players who are playing as fighters assigned to the Green Team
;	Green_Flagship			- 	Players who are playing as the Flagship assigned to the Green Team	
;	Gold_Fighter			- 	Players who are playing as fighters assigned to the Gold Team
;	Gold_Flagship			- 	Players who are playing as the Flagship assigned to the Gold Team
;	GameMaster				-	Player assigned as Game Master, will count the points for the Event


